name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r estaciona-ai-etapa-intermediaria/requirements.txt
          pip install pytest requests ruff

      - name: Ajustar PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/estaciona-ai-etapa-intermediaria" >> $GITHUB_ENV

      - name: Rodar lint
        run: ruff check estaciona-ai-etapa-intermediaria

      - name: Rodar testes
        run: pytest estaciona-ai-etapa-intermediaria/tests
